<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGged</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;1,14..32,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:            #0a0a0c;
  --bg-elevated:   #111114;
  --bg-raised:     #17171b;
  --bg-overlay:    #1d1d22;
  --bg-hover:      rgba(255,255,255,0.035);
  --bg-active:     rgba(255,255,255,0.055);

  --border-subtle: rgba(255,255,255,0.055);
  --border-soft:   rgba(255,255,255,0.09);
  --border-mid:    rgba(255,255,255,0.13);

  --text-primary:  #f0f0f4;
  --text-secondary:#9898b0;
  --text-tertiary: #4a4a60;
  --text-hint:     #2e2e40;

  --accent:        #4f8ef7;
  --accent-warm:   #9c7ff5;
  --accent-rgb:    79,142,247;

  --green:         #30d473;
  --green-bg:      rgba(48,212,115,0.08);
  --green-border:  rgba(48,212,115,0.18);

  --red:           #f26b6b;
  --red-bg:        rgba(242,107,107,0.08);
  --red-border:    rgba(242,107,107,0.18);

  --amber:         #f5a623;

  --r-xs:   5px;
  --r-sm:   8px;
  --r:      12px;
  --r-md:   14px;
  --r-lg:   18px;
  --r-xl:   22px;

  --sidebar-w: 272px;
  --header-h:  52px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  font-size: 13.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv05" 1, "cv11" 1, "ss01" 1;
}

/* ── Ambient layer ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 700px 500px at 65% 30%, rgba(79,142,247,0.028) 0%, transparent 65%),
    radial-gradient(ellipse 500px 400px at 25% 75%, rgba(156,127,245,0.022) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.13); }
* { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.07) transparent; }

/* ── Header ── */
header {
  position: relative; z-index: 30;
  height: var(--header-h);
  display: flex; align-items: center;
  padding: 0 20px;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(10,10,12,0.82);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  gap: 12px;
  flex-shrink: 0;
}

.wordmark {
  display: flex; align-items: center; gap: 8px;
}

.wordmark-icon {
  width: 26px; height: 26px;
  border-radius: 7px;
  background: linear-gradient(145deg, #4f8ef7 0%, #9c7ff5 100%);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.wordmark-icon svg { width: 13px; height: 13px; }

.wordmark-text {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.04em;
  color: var(--text-primary);
}

.header-divider {
  width: 1px; height: 14px;
  background: var(--border-soft);
  margin: 0 2px;
}

.header-tag {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--text-tertiary);
}

/* doc count badge */
#doc-count {
  margin-left: auto;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
  background: var(--bg-overlay);
  border: 1px solid var(--border-subtle);
  border-radius: 99px;
  padding: 2px 9px;
  display: none;
}

/* ── Layout ── */
main {
  position: relative; z-index: 1;
  display: flex;
  height: calc(100vh - var(--header-h));
  overflow: hidden;
}

/* ── Sidebar ── */
aside {
  width: var(--sidebar-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border-subtle);
  background: rgba(10,10,12,0.6);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-inner {
  flex: 1;
  overflow-y: auto;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding: 0 4px;
}

/* ── Drop zone ── */
#dropzone {
  position: relative;
  border: 1.5px dashed rgba(255,255,255,0.1);
  border-radius: var(--r-md);
  padding: 28px 16px 24px;
  text-align: center;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.22s ease, background 0.22s ease;
  user-select: none;
  isolation: isolate;
}

#dropzone::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 100% 80% at 50% 0%,
    rgba(var(--accent-rgb), 0.1) 0%, transparent 70%);
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}

#dropzone:hover, #dropzone.over {
  border-color: rgba(var(--accent-rgb), 0.4);
  background: rgba(var(--accent-rgb), 0.035);
}
#dropzone:hover::before, #dropzone.over::before { opacity: 1; }

.dz-icon-wrap {
  width: 40px; height: 40px;
  margin: 0 auto 12px;
  border-radius: var(--r-sm);
  background: var(--bg-overlay);
  border: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s;
}
#dropzone:hover .dz-icon-wrap {
  background: var(--bg-raised);
  border-color: rgba(var(--accent-rgb), 0.3);
}
.dz-icon-wrap svg { width: 18px; height: 18px; opacity: 0.7; }

.dz-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
  transition: color 0.15s;
}
#dropzone:hover .dz-title { color: var(--text-primary); }

.dz-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  line-height: 1.55;
}

/* ── Ingest status ── */
#ingest-status {
  display: none;
  font-size: 12px;
  padding: 8px 11px;
  border-radius: var(--r-sm);
  border: 1px solid transparent;
  line-height: 1.5;
}
#ingest-status.loading {
  color: var(--text-secondary);
  background: var(--bg-overlay);
  border-color: var(--border-subtle);
}
#ingest-status.success {
  color: var(--green);
  background: var(--green-bg);
  border-color: var(--green-border);
}
#ingest-status.error {
  color: var(--red);
  background: var(--red-bg);
  border-color: var(--red-border);
}

/* ── File pills ── */
#file-list { display: flex; flex-direction: column; gap: 5px; }

.file-pill {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  background: var(--bg-overlay);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  overflow: hidden;
  transition: background 0.15s, border-color 0.15s;
  cursor: default;
}
.file-pill:hover {
  background: var(--bg-hover);
  border-color: var(--border-soft);
}

.fp-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(var(--accent-rgb), 0.12);
  border: 1px solid rgba(var(--accent-rgb), 0.18);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.fp-icon svg { width: 13px; height: 13px; color: var(--accent); }

.fp-info { min-width: 0; flex: 1; }
.fp-name {
  font-size: 12px; font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 1px;
}
.fp-meta { font-size: 11px; color: var(--text-tertiary); }

.fp-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px rgba(48,212,115,0.5);
}

/* ── Sidebar footer ── */
.sidebar-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border-subtle);
  background: rgba(10,10,12,0.4);
}

.topk-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.topk-label {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 400;
}
.topk-control {
  display: flex; align-items: center; gap: 0;
  background: var(--bg-overlay);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-xs);
  overflow: hidden;
}
.topk-btn {
  width: 26px; height: 26px;
  background: transparent; border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 15px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, color 0.12s;
}
.topk-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.topk-val {
  width: 32px; height: 26px;
  text-align: center;
  font-size: 12px; font-weight: 500;
  color: var(--text-primary);
  display: flex; align-items: center; justify-content: center;
  border-left: 1px solid var(--border-subtle);
  border-right: 1px solid var(--border-subtle);
  font-variant-numeric: tabular-nums;
}

/* ── Main panel ── */
section {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Output ── */
#output {
  flex: 1;
  overflow-y: auto;
  padding: 36px 48px;
  display: flex;
  flex-direction: column;
  gap: 44px;
}

/* ── Empty state ── */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  text-align: center;
  padding-bottom: 80px;
  pointer-events: none;
  animation: esIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes esIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.es-ring {
  position: relative;
  width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 6px;
}
.es-ring::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid var(--border-soft);
  animation: ringPulse 3s ease-in-out infinite;
}
.es-ring::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid var(--border-subtle);
  animation: ringPulse 3s ease-in-out 0.5s infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.05); opacity: 0.15; }
}
.es-glyph {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--bg-overlay);
  border: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: center;
}
.es-glyph svg { width: 24px; height: 24px; color: var(--text-tertiary); }

.es-title {
  font-size: 15px; font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: -0.02em;
}
.es-body {
  font-size: 13px;
  color: var(--text-tertiary);
  max-width: 200px;
  line-height: 1.65;
}

/* ── Response block ── */
.response {
  display: flex; flex-direction: column; gap: 20px;
  max-width: 800px;
  animation: blockIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes blockIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Question bubble */
.q-bubble {
  align-self: flex-end;
  max-width: 68%;
  background: rgba(var(--accent-rgb), 0.11);
  border: 1px solid rgba(var(--accent-rgb), 0.18);
  border-radius: 18px 18px 5px 18px;
  padding: 11px 16px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

/* Pipeline */
.pipeline {
  display: flex; align-items: center; gap: 5px;
  padding: 0 2px;
}
.pip-step {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.01em;
  color: var(--text-hint);
  transition: color 0.3s ease;
}
.pip-step.active { color: var(--text-secondary); }
.pip-step.done   { color: var(--green); }

.pip-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
  transition: background 0.3s;
}
.pip-step.active .pip-dot {
  width: 5px; height: 5px;
  animation: pip-pulse 1.2s ease-in-out infinite;
}
@keyframes pip-pulse {
  0%, 100% { opacity: 0.35; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}

.pip-connector {
  flex: 1;
  max-width: 24px;
  height: 1px;
  background: var(--border-subtle);
  border-radius: 1px;
}
.pip-connector.done { background: rgba(48,212,115,0.3); }

/* Section label */
.blk-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

/* HyDE */
.hyde-wrap {
  background: rgba(156,127,245,0.05);
  border: 1px solid rgba(156,127,245,0.12);
  border-radius: var(--r-md);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.hyde-wrap::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent), var(--accent-warm));
  border-radius: 2px 0 0 2px;
}
.hyde-text {
  font-size: 13px;
  font-style: italic;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* Sources */
.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
  gap: 7px;
}

.source-card {
  background: var(--bg-overlay);
  border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  cursor: default;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
  animation: cardIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.97) translateY(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.source-card:hover {
  background: var(--bg-hover);
  border-color: var(--border-soft);
  transform: translateY(-1px);
}

.sc-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 7px;
}
.sc-rank {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-tertiary);
}
.sc-pct {
  font-size: 11px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--accent);
}

.sc-name {
  font-size: 12px; font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.sc-page {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.rel-track {
  height: 2px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px;
  overflow: hidden;
}
.rel-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-warm) 100%);
  border-radius: 99px;
  width: 0%;
  transition: width 0.75s cubic-bezier(0.16,1,0.3,1);
}

/* Shimmer / thinking */
.thinking-wrap {
  display: flex; flex-direction: column; gap: 9px;
  padding: 2px 0;
}
.shimmer-line {
  height: 10px; border-radius: 6px;
  background: linear-gradient(90deg,
    rgba(255,255,255,0.03) 0%,
    rgba(255,255,255,0.065) 40%,
    rgba(255,255,255,0.065) 60%,
    rgba(255,255,255,0.03) 100%
  );
  background-size: 250% 100%;
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Answer */
.answer-text {
  font-size: 14.5px;
  line-height: 1.9;
  color: var(--text-primary);
  white-space: pre-wrap;
  word-break: break-word;
  letter-spacing: -0.005em;
}

.cursor {
  display: inline-block;
  width: 1.5px; height: 16px;
  background: var(--accent);
  border-radius: 1px;
  margin-left: 2px;
  vertical-align: middle;
  animation: blink 0.9s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input area ── */
#input-area {
  position: relative;
  padding: 14px 48px 20px;
  border-top: 1px solid var(--border-subtle);
  background: rgba(10,10,12,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  flex-shrink: 0;
}

/* gradient fade from output into input */
#input-area::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: -48px; height: 48px;
  background: linear-gradient(to bottom, transparent, rgba(10,10,12,0.5));
  pointer-events: none;
}

.input-composer {
  background: var(--bg-raised);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-composer:focus-within {
  border-color: rgba(var(--accent-rgb), 0.4);
  box-shadow:
    0 0 0 3px rgba(var(--accent-rgb), 0.08),
    0 1px 24px rgba(0,0,0,0.4);
}

#question-input {
  display: block;
  width: 100%;
  background: transparent;
  border: none; outline: none;
  padding: 14px 16px 12px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.65;
  resize: none;
  min-height: 52px;
  max-height: 180px;
  overflow-y: auto;
}
#question-input::placeholder { color: var(--text-tertiary); }

.composer-footer {
  display: flex; align-items: center;
  padding: 8px 10px 8px 14px;
  border-top: 1px solid var(--border-subtle);
  gap: 8px;
}

.cf-hint {
  flex: 1;
  font-size: 11px;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 5px;
}
.cf-hint kbd {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--bg-overlay);
  border: 1px solid var(--border-soft);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 1px 5px;
  font-family: inherit;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  letter-spacing: 0.01em;
}

#ask-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-sm);
  padding: 7px 15px;
  font-size: 12.5px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: opacity 0.15s, box-shadow 0.2s, transform 0.12s;
  box-shadow: 0 1px 10px rgba(var(--accent-rgb), 0.35), 0 0 0 1px rgba(var(--accent-rgb), 0.3);
  white-space: nowrap;
}
#ask-btn svg { width: 13px; height: 13px; transition: transform 0.15s; }
#ask-btn:hover:not(:disabled) {
  box-shadow: 0 2px 18px rgba(var(--accent-rgb), 0.5), 0 0 0 1px rgba(var(--accent-rgb), 0.4);
  transform: translateY(-1px);
}
#ask-btn:hover:not(:disabled) svg { transform: translateX(2px); }
#ask-btn:active:not(:disabled) {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 1px 8px rgba(var(--accent-rgb), 0.3);
}
#ask-btn:disabled {
  opacity: 0.35; cursor: not-allowed;
  box-shadow: none; transform: none;
}

/* ── Spinner ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 13px; height: 13px;
  border: 1.5px solid rgba(255,255,255,0.25);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

/* ── Scrollend indicator ── */
.scroll-end-fade {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}

</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="wordmark">
    <div class="wordmark-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
      </svg>
    </div>
    <span class="wordmark-text">RAGged</span>
  </div>
  <div class="header-divider"></div>
  <span class="header-tag">Retrieval-Augmented Generation</span>
  <span id="doc-count"></span>
</header>

<main>

  <!-- ── Sidebar ── -->
  <aside>
    <div class="sidebar-inner">

      <p class="sidebar-section-label">Documents</p>

      <div id="dropzone">
        <div class="dz-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <p class="dz-title">Drop PDF to ingest</p>
        <p class="dz-sub">or click to browse files</p>
      </div>
      <input type="file" id="file-input" accept=".pdf" hidden>

      <div id="ingest-status"></div>
      <div id="file-list"></div>

    </div>

    <!-- Sidebar footer: top-k control -->
    <div class="sidebar-footer">
      <div class="topk-row">
        <span class="topk-label">Sources to retrieve</span>
        <div class="topk-control">
          <button class="topk-btn" id="topk-dec" aria-label="Decrease">−</button>
          <div class="topk-val" id="topk-val">5</div>
          <button class="topk-btn" id="topk-inc" aria-label="Increase">+</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Query panel ── -->
  <section>
    <div id="output">
      <div id="empty-state">
        <div class="es-ring">
          <div class="es-glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
          </div>
        </div>
        <p class="es-title">Nothing yet</p>
        <p class="es-body">Upload a PDF, then ask it anything.</p>
      </div>
    </div>

    <div id="input-area">
      <div class="input-composer">
        <textarea id="question-input" placeholder="Ask a question about your document…" rows="2"></textarea>
        <div class="composer-footer">
          <div class="cf-hint">
            <kbd>⌘</kbd><kbd>↵</kbd> to send
          </div>
          <button id="ask-btn">
            <span id="ask-label">Ask</span>
            <svg id="ask-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"/>
              <polyline points="12 5 19 12 12 19"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </section>

</main>

<script>
/* ── State ── */
let topK = 5;
let fileCount = 0;

/* ── Top-K control ── */
const topkVal = document.getElementById('topk-val');
document.getElementById('topk-dec').addEventListener('click', () => {
  if (topK > 1) { topK--; topkVal.textContent = topK; }
});
document.getElementById('topk-inc').addEventListener('click', () => {
  if (topK < 20) { topK++; topkVal.textContent = topK; }
});

/* ── Drop zone ── */
const dropzone     = document.getElementById('dropzone');
const fileInput    = document.getElementById('file-input');
const ingestStatus = document.getElementById('ingest-status');
const fileList     = document.getElementById('file-list');
const docCount     = document.getElementById('doc-count');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) ingestFile(f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) ingestFile(fileInput.files[0]);
  fileInput.value = '';
});

async function ingestFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    setStatus('Only PDF files are supported.', 'error'); return;
  }
  setStatus(`Ingesting "${truncate(file.name, 28)}"…`, 'loading');
  const form = new FormData();
  form.append('file', file);
  try {
    const res  = await fetch('/ingest', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) { setStatus(data.detail || 'Ingest failed.', 'error'); return; }
    setStatus(`✓ ${data.chunks_ingested} chunks indexed`, 'success');
    addFilePill(data.filename, data.chunks_ingested);
    fileCount++;
    docCount.textContent = fileCount === 1 ? '1 document' : `${fileCount} documents`;
    docCount.style.display = 'block';
  } catch {
    setStatus('Network error — is the server running?', 'error');
  }
}

function setStatus(msg, type) {
  ingestStatus.textContent = msg;
  ingestStatus.className = type;
  ingestStatus.style.display = 'block';
}

function addFilePill(name, chunks) {
  const el = document.createElement('div');
  el.className = 'file-pill';
  el.style.animation = 'blockIn 0.3s cubic-bezier(0.16,1,0.3,1) both';
  el.innerHTML = `
    <div class="fp-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
    </div>
    <div class="fp-info">
      <div class="fp-name" title="${name}">${name}</div>
      <div class="fp-meta">${chunks} chunks indexed</div>
    </div>
    <div class="fp-dot"></div>`;
  fileList.prepend(el);
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

/* ── Query ── */
const output        = document.getElementById('output');
const questionInput = document.getElementById('question-input');
const askBtn        = document.getElementById('ask-btn');
const askLabel      = document.getElementById('ask-label');
const askIcon       = document.getElementById('ask-icon');

questionInput.addEventListener('input', () => {
  questionInput.style.height = 'auto';
  questionInput.style.height = Math.min(questionInput.scrollHeight, 180) + 'px';
});
questionInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); submitQuery(); }
});
askBtn.addEventListener('click', submitQuery);

/* Pipeline */
const STEPS = ['hypothesis', 'sources', 'answering'];
const STEP_LABELS = { hypothesis: 'Hypothesis', sources: 'Sources', answering: 'Answer' };

function makePipeline() {
  const wrap = mk('div', 'pipeline');
  const els = {};
  STEPS.forEach((s, i) => {
    const step = mk('span', 'pip-step');
    const dot  = mk('span', 'pip-dot');
    step.append(dot, document.createTextNode(STEP_LABELS[s]));
    wrap.appendChild(step);
    els[s] = step;
    if (i < STEPS.length - 1) {
      const conn = mk('span', 'pip-connector');
      conn.dataset.step = s;
      wrap.appendChild(conn);
    }
  });
  return { wrap, els };
}

function setPipelineActive(els, wrap, step) {
  const idx = STEPS.indexOf(step);
  STEPS.forEach((s, i) => {
    els[s].className = i < idx ? 'pip-step done' : i === idx ? 'pip-step active' : 'pip-step';
  });
  wrap.querySelectorAll('.pip-connector').forEach((c, i) => {
    c.classList.toggle('done', i < idx);
  });
}

function setPipelineDone(els, wrap) {
  STEPS.forEach(s => els[s].className = 'pip-step done');
  wrap.querySelectorAll('.pip-connector').forEach(c => c.classList.add('done'));
}

async function submitQuery() {
  const question = questionInput.value.trim();
  if (!question || askBtn.disabled) return;

  const es = document.getElementById('empty-state');
  if (es) es.remove();

  setLocked(true);
  questionInput.value = '';
  questionInput.style.height = 'auto';

  /* ── Build response DOM ── */
  const block = mk('div', 'response');

  const qBubble = mk('div', 'q-bubble');
  qBubble.textContent = question;

  const { wrap: pipWrap, els: pipEls } = makePipeline();
  setPipelineActive(pipEls, pipWrap, 'hypothesis');

  // HyDE
  const hydeSection = mk('div');
  hydeSection.style.display = 'none';
  const hydeLbl  = lbl('Hypothetical answer');
  const hydeWrap = mk('div', 'hyde-wrap');
  const hydeText = mk('p', 'hyde-text');
  hydeWrap.appendChild(hydeText);
  hydeSection.append(hydeLbl, hydeWrap);

  // Sources
  const srcSection = mk('div');
  srcSection.style.display = 'none';
  const srcLbl  = lbl('Retrieved sources');
  const srcGrid = mk('div', 'source-grid');
  srcSection.append(srcLbl, srcGrid);

  // Thinking shimmer
  const thinkWrap = mk('div', 'thinking-wrap');
  [72, 58, 40].forEach((w, i) => {
    const line = mk('div', 'shimmer-line');
    line.style.cssText = `width:${w}%; animation-delay:${i * 0.18}s`;
    thinkWrap.appendChild(line);
  });

  // Answer
  const ansSection = mk('div');
  ansSection.style.display = 'none';
  const ansLbl  = lbl('Answer');
  const ansText = mk('div', 'answer-text');
  const cursor  = mk('span', 'cursor');
  ansSection.append(ansLbl, ansText);

  block.append(qBubble, pipWrap, hydeSection, srcSection, thinkWrap, ansSection);
  output.appendChild(block);
  scrollEnd();

  /* ── Stream ── */
  try {
    const res = await fetch('/query/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, top_k: topK }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      thinkWrap.remove();
      ansSection.style.display = 'block';
      ansText.textContent = `Error: ${err.detail || res.statusText}`;
      setPipelineDone(pipEls, pipWrap);
      return;
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(part.slice(6)); } catch { continue; }

        if (evt.type === 'hyde') {
          hydeSection.style.display = 'block';
          hydeText.textContent = evt.text;
          setPipelineActive(pipEls, pipWrap, 'sources');
          scrollEnd();

        } else if (evt.type === 'sources') {
          thinkWrap.remove();
          srcSection.style.display = 'block';
          ansSection.style.display = 'block';
          ansText.appendChild(cursor);
          setPipelineActive(pipEls, pipWrap, 'answering');

          evt.sources.forEach((s, i) => {
            const pct  = Math.round(s.relevance * 100);
            const card = mk('div', 'source-card');
            card.style.animationDelay = (i * 0.06) + 's';
            card.innerHTML = `
              <div class="sc-top">
                <span class="sc-rank">Source ${i + 1}</span>
                <span class="sc-pct">${pct}%</span>
              </div>
              <div class="sc-name" title="${esc(s.source)}">${esc(s.source)}</div>
              <div class="sc-page">Page ${s.page}</div>
              <div class="rel-track"><div class="rel-fill"></div></div>`;
            srcGrid.appendChild(card);
            requestAnimationFrame(() => {
              card.querySelector('.rel-fill').style.width = pct + '%';
            });
          });
          scrollEnd();

        } else if (evt.type === 'delta') {
          ansText.insertBefore(document.createTextNode(evt.text), cursor);
          scrollEnd();

        } else if (evt.type === 'done') {
          cursor.remove();
          setPipelineDone(pipEls, pipWrap);
        }
      }
    }
  } catch {
    thinkWrap.remove();
    ansSection.style.display = 'block';
    ansText.textContent = 'Network error — is the server running?';
    cursor.remove();
  } finally {
    setLocked(false);
    questionInput.focus();
  }
}

function setLocked(v) {
  askBtn.disabled = v;
  questionInput.disabled = v;
  if (v) {
    askLabel.textContent = 'Working';
    askIcon.outerHTML = `<div class="spinner" id="ask-icon"></div>`;
  } else {
    const spinner = document.getElementById('ask-icon');
    if (spinner) {
      spinner.outerHTML = `<svg id="ask-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
    }
    askLabel.textContent = 'Ask';
  }
}

function scrollEnd() {
  requestAnimationFrame(() => { output.scrollTop = output.scrollHeight; });
}

function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function lbl(text) {
  const e = mk('p', 'blk-label');
  e.textContent = text;
  return e;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
